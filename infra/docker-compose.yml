services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hrms
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: hrms
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

  object-storage:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hrms
      MINIO_ROOT_PASSWORD: hrms-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - object-storage-data:/data

volumes:
  postgres-data:
  object-storage-data:
